[build]
  command   = "pnpm install --no-frozen-lockfile && pnpm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10.30.3"

# SPA fallback — all routes serve index.html so TanStack Router handles them
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Never cache HTML (always fresh)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Cache the world map TopoJSON for a week
[[headers]]
  for = "/world-110m.json"
  [headers.values]
    Cache-Control = "public, max-age=604800"
